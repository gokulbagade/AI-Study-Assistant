<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Assistant </title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="min-h-screen bg-slate-50 font-sans flex flex-col antialiased text-slate-800" id="study-app-root">
    
    <!-- Dynamic Background Grid Mesh -->
    <div class="absolute inset-0 bg-[linear-gradient(to_right,#e2e8f0_1px,transparent_1px),linear-gradient(to_bottom,#e2e8f0_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#000_70%,transparent_100%)] pointer-events-none opacity-30"></div>

    <!-- Main Header Render Mount Mount Point -->
    <div id="header-mount" class="relative z-10 w-full"></div>

    <!-- Primary Application Layout Grid -->
    <main class="max-w-7xl mx-auto px-6 py-8 w-full flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-2">
      
      <!-- Left Side: Study Sidebar / Command Panel -->
      <section class="col-span-1 lg:col-span-5 space-y-6 flex flex-col justify-start" id="sidebar-panel">
        
        <div class="bg-white rounded-2xl border border-slate-200/80 p-5 md:p-6 smooth-shadow space-y-5">
          <h2 class="text-sm font-bold font-display tracking-wide uppercase text-slate-900 border-b border-slate-100 pb-3 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
            Workspace Settings
          </h2>

          <!-- Subject Category Select Mount -->
          <div id="category-selector-mount"></div>

          <!-- Response Tone/Style Select Mount -->
          <div id="tone-selector-mount"></div>
        </div>

        <!-- Session History Log Mount -->
        <div class="bg-white rounded-2xl border border-slate-200/80 p-5 md:p-6 smooth-shadow flex-1" id="saved-queries-mount"></div>

      </section>

      <!-- Right Side: Primary interactive input box + Response board -->
      <section class="col-span-1 lg:col-span-7 flex flex-col gap-6" id="interaction-panel">
        
        <!-- Main Question Input Field Card -->
        <div class="bg-white rounded-2xl border border-slate-200/80 p-5 md:p-6 smooth-shadow">
          <form id="query-settings-form" class="space-y-4" onsubmit="return false;">
            <div class="space-y-2">
              <div class="flex items-center justify-between">
                <label htmlFor="question-input" class="text-xs font-bold text-slate-700 uppercase tracking-wider block font-display">
                  Ask any Academic Question
                </label>
                <span class="text-[11px] text-blue-600 font-semibold flex items-center gap-1">
                  <svg class="w-3 h-3 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
                  </svg>
                  Curriculum Aligned Response
                </span>
              </div>
              
              <div class="relative">
                <textarea
                  id="question-input"
                  placeholder="e.g., Explain Newton's laws of motion with simple examples..."
                  class="w-full min-h-[100px] max-h-[220px] p-4 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-500/10 transition-all font-sans placeholder:text-slate-400 outline-none pb-12"
                  rows="3"
                ></textarea>
                
                <!-- Floating Submit Query Button -->
                <div class="absolute right-3 bottom-3 flex items-center gap-2">
                  <button
                    id="submit-query-btn"
                    type="submit"
                    class="h-9 px-4 rounded-lg font-bold text-xs flex items-center gap-1.5 transition-all outline-none bg-slate-100 text-slate-400 cursor-not-allowed"
                    disabled
                  >
                    <span>Submit Query</span>
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <!-- Subject Suggested Prompt Pills Mount -->
            <div id="suggested-pills-container"></div>
          </form>
        </div>

        <!-- Master Response View Display Board -->
        <div class="flex-1 flex flex-col" id="response-mount"></div>

      </section>

    </main>

    <!-- Global Module Script Entrypoint -->
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
